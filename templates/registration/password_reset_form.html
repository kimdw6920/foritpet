{% extends 'base.html' %}

{% block title %}비밀번호 재설정 - 포잇펫{% endblock %}

{% block content %}
<div class="py-4">
    <h4 class="fw-bold text-center mb-4">비밀번호 재설정</h4>
    <p class="text-muted small text-center">가입한 이메일 주소로 비밀번호 재설정 링크를 보내드립니다.</p>

    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_email">이메일</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">재설정 링크 보내기</button>
    </form>
</div>
{% endblock %}
