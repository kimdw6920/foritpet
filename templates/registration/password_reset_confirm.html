{% extends 'base.html' %}

{% block title %}새 비밀번호 설정 - 포잇펫{% endblock %}

{% block content %}
<div class="py-4">
    <h4 class="fw-bold text-center mb-4">새 비밀번호 설정</h4>

    {% if validlink %}
    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="mb-3">
            <label class="form-label" for="id_new_password1">새 비밀번호</label>
            {{ form.new_password1 }}
        </div>
        <div class="mb-3">
            <label class="form-label" for="id_new_password2">새 비밀번호 확인</label>
            {{ form.new_password2 }}
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">비밀번호 변경</button>
    </form>
    {% else %}
    <p class="text-muted text-center">이 링크는 이미 사용되었거나 유효하지 않습니다.</p>
    {% endif %}
</div>
{% endblock %}
