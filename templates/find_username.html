{% extends 'base.html' %}

{% block title %}아이디 찾기 - 포잇펫{% endblock %}

{% block content %}
<div class="py-4">
    <h4 class="fw-bold text-center mb-4">아이디 찾기</h4>
    <p class="text-muted small text-center">가입 시 사용한 이메일 주소를 입력해 주세요.</p>

    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_email">이메일</label>
            <input type="email" name="email" id="id_email" class="form-control" required placeholder="example@email.com">
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">아이디 안내 메일 받기</button>
    </form>
</div>
{% endblock %}
