<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}포잇펫 - 후원 중개 플랫폼{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ MEDIA_URL }}logos/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8f9fa; }
        .mobile-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,.06); }
        .content { padding-bottom: 80px; }
        .bottom-nav a { padding: 8px 0; color: #333; }
        .bottom-nav a:hover, .bottom-nav a.active { color: #0d6efd; }
        .site-logo { max-height: 36px; width: auto; object-fit: contain; }
        .site-logo-sm { max-height: 28px; width: auto; object-fit: contain; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <nav class="navbar navbar-light bg-white border-bottom sticky-top">
            <div class="container-fluid justify-content-between align-items-center">
                <a class="navbar-brand py-0" href="{% url 'home' %}" title="포잇펫">
                    <img src="{{ MEDIA_URL }}logos/logo.png" alt="포잇펫" class="site-logo">
                </a>
                <div class="d-flex align-items-center gap-2">
                    {% if user.is_authenticated %}
                    <span class="small text-muted">{{ user.username }}님</span>
                    <form method="post" action="{% url 'logout' %}" class="mb-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
                    </form>
                    {% else %}
                    {% url 'login' as login_url %}
                    <a href="{{ login_url }}{% if request.path != login_url %}?next={{ request.path|urlencode }}{% endif %}" class="btn btn-outline-primary btn-sm">로그인</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <div class="content p-3">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% block content %}
            {% endblock %}
        </div>

        <nav class="navbar fixed-bottom navbar-light bg-white border-top bottom-nav">
            <div class="container-fluid justify-content-around">
                <a href="{% url 'home' %}" class="text-center text-decoration-none">🏠<br><small>메인 홈</small></a>
                <a href="{% url 'shelter_list' %}" class="text-center text-decoration-none">🔍<br><small>보호소 조회</small></a>
                <a href="{% url 'community_list' %}" class="text-center text-decoration-none">💬<br><small>커뮤니티</small></a>
                <a href="{% url 'mypage' %}" class="text-center text-decoration-none">👤<br><small>내 정보</small></a>
            </div>
        </nav>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
